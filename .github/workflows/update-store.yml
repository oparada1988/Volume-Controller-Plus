name: Update Store Manifest

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-store:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"
    steps:
      - name: Checkout Plugin Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate and Update Version
        id: bump_version
        run: |
          # Write python bump script
          cat << 'EOF' > bump.py
import json
import re

# Read current version
with open('manifest.json') as f:
    data = json.load(f)
version = data['version']

# Increment logic: Z goes up to 10. Rollover: X.Y.10 -> X.(Y+1).0, and X.9.10 -> (X+1).0.0
try:
    parts = [int(p) for p in version.split('.')]
    if len(parts) == 3:
        x, y, z = parts
        if z < 10:
            new_ver = f"{x}.{y}.{z+1}"
        else:
            if y < 9:
                new_ver = f"{x}.{y+1}.0"
            else:
                new_ver = f"{x+1}.0.0"
    else:
        new_ver = "1.0.1"
except Exception:
    new_ver = "1.0.1"

# Update files if changed
if version != new_ver:
    data['version'] = new_ver
    with open('manifest.json', 'w') as f:
        json.dump(data, f, indent=4)
        
    with open('main.py', 'r') as f:
        content = f.read()
    content = re.sub(r'plugin_version\s*=\s*["\'][^\'"]+["\']', f'plugin_version = "{new_ver}"', content)
    with open('main.py', 'w') as f:
        f.write(content)

print(new_ver)
EOF

          NEW_VERSION=$(python3 bump.py)
          rm bump.py
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          
          # Commit version change if any
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json main.py
          # Commit only if there are changes
          if ! git diff --quiet HEAD; then
            git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
            git push
          fi
          
          # Set the final commit hash in env
          echo "COMMIT_HASH=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Checkout Store Repository
        uses: actions/checkout@v4
        with:
          repository: oparada1988/StreamController-Store
          token: ${{ secrets.STORE_ACCESS_TOKEN }}
          path: store

      - name: Update Plugins.json in Store
        run: |
          cd store
          
          cat << 'EOF' > update_store.py
import json
import os

new_version = os.environ.get('NEW_VERSION')
commit_hash = os.environ.get('COMMIT_HASH')

with open('Plugins.json', 'r') as f:
    data = json.load(f)

for plugin in data:
    if 'Volume-Controller-Plus' in plugin['url']:
        if 'commits' not in plugin:
            plugin['commits'] = {}
        plugin['commits'][new_version] = commit_hash

with open('Plugins.json', 'w') as f:
    json.dump(data, f, indent=2)
EOF

          NEW_VERSION="${{ env.NEW_VERSION }}" COMMIT_HASH="${{ env.COMMIT_HASH }}" python3 update_store.py
          rm update_store.py

      - name: Commit and Push Changes to Store
        run: |
          cd store
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Plugins.json
          git commit -m "Auto-update Volume-Controller-Plus to version ${{ env.NEW_VERSION }} (commit ${{ env.COMMIT_HASH }})" || exit 0
          git push
